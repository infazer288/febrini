<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yapım Aşamasında</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #f4f4f4;
      font-family: Arial, sans-serif;
    }

    .container {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container img {
      max-width: 100%;
      max-height: 90vh;
      width: auto;
      height: auto;
      display: block;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
      border-radius: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="yapim-asamasinda.jpeg" alt="Yapım aşamasında" />
  </div>
</body>
</html>
